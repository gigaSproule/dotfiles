name: 'Run main workflow'

on:
  pull_request:
  push:
    branches:
      - "master"
    tags:
      - "*"

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: '${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}'
  cancel-in-progress: true

jobs:
  check-formatting:
    runs-on: "ubuntu-latest"
    timeout-minutes: 30
    if: github.ref_type != 'tags'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Configure Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Run formatting check
        run: cargo fmt --all -- --check
  lint:
    runs-on: "ubuntu-latest"
    timeout-minutes: 30
    if: github.ref_type != 'tags'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Configure Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Run lint
        run: cargo clippy --all-features --all-targets
  test-linux:
    runs-on: "ubuntu-latest"
    timeout-minutes: 30
    if: github.ref_type != 'tags'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Configure Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test
  test-windows:
    runs-on: "windows-latest"
    timeout-minutes: 30
    if: github.ref_type != 'tags'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Configure Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test
  test-macos:
    runs-on: "macos-latest"
    timeout-minutes: 30
    if: github.ref_type != 'tags'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Configure Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test
  build-linux:
    runs-on: "ubuntu-latest"
    timeout-minutes: 30
    if: github.event_name != 'pull_request' && !failure()
    needs:
      - test-linux
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Configure Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Run build
        run: cargo build --release
      - name: Rename binary
        run: mv target/release/dotfiles target/release/dotfiles-linux
      - name: Temporarily save linux binary
        uses: actions/upload-artifact@v7
        with:
          name: dotfiles-linux
          path: target/release/dotfiles-linux
          retention-days: 1
  build-windows:
    runs-on: "windows-latest"
    timeout-minutes: 30
    if: github.event_name != 'pull_request' && !failure()
    needs:
      - test-windows
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Configure Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Run build
        run: cargo build --release
      - name: Rename binary
        run: mv target\release\dotfiles.exe target\release\dotfiles-windows.exe
      - name: Temporarily save windows binary
        uses: actions/upload-artifact@v7
        with:
          name: dotfiles-windows
          path: target\release\dotfiles-windows.exe
          retention-days: 1
  build-macos:
    runs-on: "macos-latest"
    timeout-minutes: 30
    if: github.event_name != 'pull_request' && !failure()
    needs:
      - test-macos
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Configure Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Run build
        run: cargo build --release
      - name: Rename binary
        run: mv target/release/dotfiles target/release/dotfiles-macos
      - name: Temporarily save mac os binary
        uses: actions/upload-artifact@v7
        with:
          name: dotfiles-macos
          path: target/release/dotfiles-macos
          retention-days: 1
  release:
    runs-on: "ubuntu-latest"
    timeout-minutes: 30
    if: github.ref_type == 'tag'
    needs:
      - build-linux
      - build-windows
      - build-macos
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          token: ${{ steps.app-token.outputs.token }}
      - run: |
          git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config --global user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'
          gh auth setup-git
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
      - name: Set version for release
        run: |
          cargo install cargo-edit --no-default-features --features "set-version"
          cargo set-version ${{ github.ref_name }}
      - name: Commit release version
        run: |
          git add Cargo.toml Cargo.lock
          git commit -m "chore: set version to ${{ github.ref_name }}"
      - name: Retrieve saved linux binary
        uses: actions/download-artifact@v8
        with:
          name: dotfiles-linux
      - name: Retrieve saved windows binary
        uses: actions/download-artifact@v8
        with:
          name: dotfiles-windows
      - name: Retrieve saved mac os binary
        uses: actions/download-artifact@v8
        with:
          name: dotfiles-macos
      - name: Set version for release
        run: |
          cargo install cargo-edit --no-default-features --features "set-version"
          cargo set-version ${{ github.ref_name }}
      - name: Commit release version
        run: |
          git add Cargo.toml Cargo.lock
          git commit -m "chore: set version to ${{ github.ref_name }}"
          git push origin HEAD:main
      - name: Create Release
        uses: ncipollo/release-action@v1.21.0
        with:
          artifacts: dotfiles-linux,dotfiles-macos,dotfiles-windows.exe
          generateReleaseNotes: true
          makeLatest: true

